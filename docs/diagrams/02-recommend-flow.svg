<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 780 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t2 d2">
  <title id="t2">The /recommend request flow</title>
  <desc id="d2">A click runs Planner, then Retrieval (recall from memory), Analyzer (findings + missing info, with a re-plan loop), Recommender (multi-factor ranking using case memory), and Explainer. The output goes to the human, who approves into Execution (Gmail draft) and feeds the decision back to memory to learn.</desc>
  <style>
    svg{--paper:#ffffff;--ink:#1f2430;--mut:#6b7280;--bd:#dadde4;
        --core:#efedff;--coreln:#6d5efc;--coreink:#3d34b8;
        --mem:#e7f7f0;--memln:#10a37f;--memink:#0a7558;font-family:'Inter',system-ui,Arial,sans-serif;}
    .mut{fill:var(--mut);}
    .step{fill:var(--core);stroke:var(--coreln);stroke-width:1.3;}
    .st{fill:var(--coreink);font-weight:600;font-size:13px;} .ss{fill:var(--mut);font-size:10.5px;}
    .fl{stroke:var(--mut);stroke-width:1.5;fill:none;} .gl{stroke:var(--memln);stroke-width:1.4;fill:none;}
    .hl{stroke:var(--coreln);stroke-width:1.4;fill:none;stroke-dasharray:5 4;}
    .badge{fill:var(--coreln);} .bn{fill:#fff;font-weight:700;font-size:12px;}
  </style>
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--mut)"/></marker>
    <marker id="g2" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--memln)"/></marker>
    <marker id="h2" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="var(--coreln)"/></marker>
  </defs>

  <rect x="1" y="1" width="778" height="598" rx="14" fill="var(--paper)" stroke="var(--bd)"/>
  <text x="30" y="38" fill="var(--ink)" font-size="20" font-weight="700">The /recommend request flow</text>
  <text x="30" y="57" class="mut" font-size="12">POST /recommend → planner orchestrates the agents over a shared "blackboard", then the human closes the loop.</text>

  <g>
    <rect x="150" y="80" width="300" height="50" rx="9" class="step"/><text x="300" y="101" text-anchor="middle" class="st">Planner</text><text x="300" y="118" text-anchor="middle" class="ss">reads agent registry → builds the plan</text>
    <circle cx="150" cy="105" r="13" class="badge"/><text x="150" y="109" text-anchor="middle" class="bn">1</text>
    <rect x="150" y="150" width="300" height="50" rx="9" class="step"/><text x="300" y="171" text-anchor="middle" class="st">Retrieval</text><text x="300" y="188" text-anchor="middle" class="ss">memory.recall() → evidence + context</text>
    <circle cx="150" cy="175" r="13" class="badge"/><text x="150" y="179" text-anchor="middle" class="bn">2</text>
    <rect x="150" y="220" width="300" height="50" rx="9" class="step"/><text x="300" y="241" text-anchor="middle" class="st">Analyzer</text><text x="300" y="258" text-anchor="middle" class="ss">LLM → findings[] + missing[]</text>
    <circle cx="150" cy="245" r="13" class="badge"/><text x="150" y="249" text-anchor="middle" class="bn">3</text>
    <rect x="150" y="300" width="300" height="50" rx="9" class="step"/><text x="300" y="321" text-anchor="middle" class="st">Recommender (ranker)</text><text x="300" y="338" text-anchor="middle" class="ss">score on impact/urgency/conf/effort → priority</text>
    <circle cx="150" cy="325" r="13" class="badge"/><text x="150" y="329" text-anchor="middle" class="bn">4</text>
    <rect x="150" y="370" width="300" height="50" rx="9" class="step"/><text x="300" y="391" text-anchor="middle" class="st">Explainer</text><text x="300" y="408" text-anchor="middle" class="ss">attach evidence + reasoning trace</text>
    <circle cx="150" cy="395" r="13" class="badge"/><text x="150" y="399" text-anchor="middle" class="bn">5</text>
  </g>
  <path class="fl" d="M300,130 L300,150" marker-end="url(#a2)"/>
  <path class="fl" d="M300,200 L300,220" marker-end="url(#a2)"/>
  <path class="fl" d="M300,270 L300,300" marker-end="url(#a2)"/>
  <path class="fl" d="M300,350 L300,370" marker-end="url(#a2)"/>

  <path class="hl" d="M150,236 C70,236 70,290 130,290 L150,290" marker-end="url(#h2)"/>
  <rect x="22" y="246" width="92" height="34" rx="7" fill="var(--paper)" stroke="var(--coreln)" stroke-width="1.2"/>
  <text x="68" y="261" text-anchor="middle" fill="var(--coreink)" font-weight="600" font-size="9.5">tool: fetch</text>
  <text x="68" y="273" text-anchor="middle" class="ss">missing info</text>
  <text x="20" y="300" class="mut" font-size="9">re-plan ↺ then re-reason</text>

  <g>
    <rect x="560" y="150" width="170" height="170" fill="var(--mem)" stroke="var(--memln)" stroke-width="1.3"/>
    <ellipse cx="645" cy="150" rx="85" ry="15" fill="var(--mem)" stroke="var(--memln)" stroke-width="1.3"/>
    <ellipse cx="645" cy="320" rx="85" ry="15" fill="var(--mem)" stroke="var(--memln)" stroke-width="1.3"/>
    <text x="645" y="150" text-anchor="middle" fill="var(--memink)" font-weight="700" font-size="12">MEMORY</text>
    <text x="645" y="210" text-anchor="middle" class="ss">· vector store</text>
    <text x="645" y="230" text-anchor="middle" class="ss">· knowledge graph</text>
    <text x="645" y="250" text-anchor="middle" class="ss">· case memory</text>
    <text x="645" y="288" text-anchor="middle" fill="var(--memink)" font-size="9.5">SQLite-backed</text>
  </g>
  <path class="gl" d="M450,175 L560,180" marker-end="url(#g2)"/><text x="470" y="170" fill="var(--memink)" font-size="9.5">recall (vector+graph)</text>
  <path class="gl" d="M450,325 L560,300" marker-end="url(#g2)"/><text x="470" y="343" fill="var(--memink)" font-size="9.5">recall_decisions (cases)</text>

  <rect x="90" y="452" width="420" height="44" rx="9" fill="var(--paper)" stroke="var(--coreln)" stroke-width="1.4"/>
  <text x="300" y="472" text-anchor="middle" fill="var(--coreink)" font-weight="700" font-size="12.5">HUMAN-IN-THE-LOOP</text>
  <text x="300" y="487" text-anchor="middle" class="ss">Approve · Edit · Reject</text>
  <path class="fl" d="M300,420 L300,452" marker-end="url(#a2)"/>

  <rect x="150" y="522" width="300" height="46" rx="9" class="step"/><text x="300" y="543" text-anchor="middle" class="st">Execution → Gmail draft</text><text x="300" y="558" text-anchor="middle" class="ss">tailored email · drafts, never sends</text>
  <path class="fl" d="M300,496 L300,522" marker-end="url(#a2)"/><text x="312" y="513" class="mut" font-size="9.5">approve</text>

  <path class="hl" d="M510,474 C620,474 645,400 645,335" marker-end="url(#h2)"/>
  <text x="600" y="430" fill="var(--coreink)" font-size="9.5">improve() — learn</text>
</svg>
